version: "3.9"

services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - .cache:/app/.cache   # persist FAISS + BM25 index between restarts
    restart: unless-stopped

  api:
    build: .
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .cache:/app/.cache
    restart: unless-stopped
